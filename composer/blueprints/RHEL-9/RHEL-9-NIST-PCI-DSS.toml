# https://osbuild.org/docs/user-guide/blueprint-reference

version = '1.0.0'

name = 'RHEL-9-NIST-PCI-DSS'

# http://doi.org/10.6028/NIST.SP.1800-16
# https://complianceascode.github.io/content-pages/guides/ssg-rhel9-guide-pci-dss.html
description = '''
Red Hat Enterprise Linux (RHEL) 9
National Institute of Standards and Technology (NIST)
Payment Card Industry - Data Security Standard (PCI-DSS) (NIST 1800-16)
Profile ID:  xccdf_org.ssgproject.content_profile_pci-dss
Benchmark ID:  xccdf_org.ssgproject.content_benchmark_RHEL-9
'''

distro = 'rhel-9'

[customizations]
partitioning_mode = 'auto-lvm'

[customizations.kernel]
append = 'audit=1 audit_backlog_limit=8192'

[customizations.openscap]
profile_id = 'xccdf_org.ssgproject.content_profile_pci-dss'

[customizations.services]
enabled = ['auditd', 'firewalld']
disabled = ['nftables']
masked = []

# Compliance tooling for Security Content Automation Protocol (SCAP) remediation
[[packages]]
name = 'openscap-scanner'
version = '*'
[[packages]]
name = 'scap-security-guide'
version = '*'

# Identity Management (IdM) tooling
[[packages]]
name = 'ipa-client'
version = '*'
[[packages]]
name = 'oddjob'
version = '*'
[[packages]]
name = 'oddjob-mkhomedir'
version = '*'

# POSIX ACLs for fine-grained file permission control beyond standard ugo/rwx
[[packages]]
name = "acl"
version = "*"

# CCE-90843-4 Filesystem Integrity
[[packages]]
name = 'aide'
version = '*'

# CCE-83648-6 Plugins for the real-time interface to the audit subsystem
[[packages]]
name = 'audispd-plugins'
version = '*'

# CCE-86612-9 Enable LUKS for dm-crypt Support
[[packages]]
name = 'cryptsetup'
version = '*'

# CCE-88164-9 Host-based firewall
[[packages]]
name = 'firewalld'
version = '*'

# CCE-87823-1 Set Default firewalld Zone for Incoming Packets
[[customizations.files]]
path = '/etc/firewalld/zones/drop.xml'
mode = '0644'
user = 'root'
group = 'root'
data = '''<?xml version="1.0" encoding="utf-8"?>
<zone target="DROP">
  <short>Drop</short>
  <description>Unsolicited incoming network packets are dropped. Incoming packets that are related to outgoing network connections are accepted. Outgoing network connections are allowed.</description>
  <service name="ssh"/>
  <service name="freeipa-4"/>
  <forward/>
</zone>
'''

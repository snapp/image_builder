# https://osbuild.org/docs/user-guide/blueprint-reference

version = '1.0.0'

name = 'RHEL-9-NIST-HIPAA'

# https://doi.org/10.6028/NIST.SP.800-66r2
# https://complianceascode.github.io/content-pages/guides/ssg-rhel9-guide-hipaa.html
description = '''
Red Hat Enterprise Linux (RHEL) 9
National Institute of Standards and Technology (NIST)
Implementing the Health Insurance Portability and Accountability Act (HIPAA) Security Rule (NIST 800-66)
Profile ID:  xccdf_org.ssgproject.content_profile_hipaa
Benchmark ID:  xccdf_org.ssgproject.content_benchmark_RHEL-9
'''

distro = 'rhel-9'

[customizations]
partitioning_mode = 'auto-lvm'

[customizations.kernel]
append = 'audit=1 audit_backlog_limit=8192'

[customizations.openscap]
profile_id = 'xccdf_org.ssgproject.content_profile_hipaa'

[customizations.services]
enabled = ['auditd', 'crond', 'firewalld']
disabled = ['debug-shell', 'kdump']
masked = []

# Compliance tooling for Security Content Automation Protocol (SCAP) remediation
[[packages]]
name = 'openscap-scanner'
version = '*'
[[packages]]
name = 'scap-security-guide'
version = '*'

# Identity Management (IdM) tooling
[[packages]]
name = 'ipa-client'
version = '*'
[[packages]]
name = 'oddjob'
version = '*'
[[packages]]
name = 'oddjob-mkhomedir'
version = '*'

# CCE-88164-9 Host-based firewall
[[packages]]
name = 'firewalld'
version = '*'

# https://osbuild.org/docs/user-guide/blueprint-reference

version = '1.0.0'

name = 'RHEL-9-NIST-CUI'

# https://doi.org/10.6028/NIST.SP.800-171r3
# https://doi.org/10.6028/NIST.SP.800-53B
# https://doi.org/10.6028/NIST.FIPS.200
# https://complianceascode.github.io/content-pages/guides/ssg-rhel9-guide-cui.html
description = '''
Red Hat Enterprise Linux (RHEL) 9
National Institute of Standards and Technology (NIST)
Protecting Controlled Unclassified Information (CUI) in Nonfederal Systems and Organizations (NIST 800-171)
Control Baselines for Information Systems and Organizations (NIST 800-53)
Profile ID:  xccdf_org.ssgproject.content_profile_cui
Benchmark ID:  xccdf_org.ssgproject.content_benchmark_RHEL-9
'''

distro = 'rhel-9'

[customizations]
partitioning_mode = 'auto-lvm'
fips = true

[customizations.kernel]
append = 'audit=1 audit_backlog_limit=8192 fips=1'

[customizations.openscap]
profile_id = 'xccdf_org.ssgproject.content_profile_cui'

[customizations.services]
enabled = ['auditd', 'fapolicyd', 'firewalld', 'usbguard']
disabled = ['debug-shell', 'kdump']
masked = []

[[customizations.filesystem]]
mountpoint = '/var/log/audit'
size = 1073741824

# Compliance tooling for Security Content Automation Protocol (SCAP) remediation
[[packages]]
name = 'openscap-scanner'
version = '*'
[[packages]]
name = 'scap-security-guide'
version = '*'

# Identity Management (IdM) tooling
[[packages]]
name = 'ipa-client'
version = '*'
[[packages]]
name = 'oddjob'
version = '*'
[[packages]]
name = 'oddjob-mkhomedir'
version = '*'

# CCE-90843-4 Filesystem Integrity
[[packages]]
name = 'aide'
version = '*'

# CCE-83454-9 CLI for automatic regular execution
[[packages]]
name = 'dnf-automatic'
version = '*'

# CCE-84224-5 File Access Policy Daemon
[[packages]]
name = 'fapolicyd'
version = '*'

# CCE-83494-5 SSL, TLS, and DTLS protocols
[[packages]]
name = 'gnutls-utils'
version = '*'

# CCE-84203-9 Rogue USB device protection
[[packages]]
name = 'usbguard'
version = '*'

[[packages]]
name = 'firewalld'
version = '*'

# https://osbuild.org/docs/user-guide/blueprint-reference

version = '1.0.0'

name = 'RHEL-8-DISA-STIG-GUI'

# https://public.cyber.mil/stigs
# https://complianceascode.github.io/content-pages/guides/ssg-rhel8-guide-stig_gui.html
description = '''
Red Hat Enterprise Linux (RHEL) 8
Defense Information Systems Agency (DISA) Security Technical Implementation Guide (STIG) with GUI
Profile ID:  xccdf_org.ssgproject.content_profile_stig_gui
Benchmark ID:  xccdf_org.ssgproject.content_benchmark_RHEL-8
'''

distro = 'rhel-8'

[customizations]
partitioning_mode = 'auto-lvm'
fips = true

# audit                Enable kernel audit subsystem before any userspace processes start
# audit_backlog_limit  Increase kernel audit event backlog queue size
# fips                 Enforce FIPS 140 approved cryptographic algorithms only
# slub_debug           Poison freed pages at SLUB allocator level
# page_poison          Poison freed pages at Page allocator level
# vsyscall             Disable legacy vsyscall interface
# pti                  Enable Kernel Page Table Isolation
[customizations.kernel]
append = 'audit=1 audit_backlog_limit=8192 fips=1 slub_debug=P page_poison=1 vsyscall=none pti=on'

[customizations.openscap]
profile_id = 'xccdf_org.ssgproject.content_profile_stig_gui'

[customizations.services]
enabled = ['auditd', 'fapolicyd', 'firewalld', 'rngd', 'rsyslog', 'sshd', 'usbguard']
disabled = ['autofs', 'debug-shell', 'kdump']
masked = []

[[customizations.filesystem]]
mountpoint = '/'
size = 3221225472

[[customizations.filesystem]]
mountpoint = '/boot'
size = 805306368

[[customizations.filesystem]]
mountpoint = '/home'
size = 1073741824

[[customizations.filesystem]]
mountpoint = '/tmp'
size = 1073741824

[[customizations.filesystem]]
mountpoint = '/var'
size = 2147483648

[[customizations.filesystem]]
mountpoint = '/var/log'
size = 1073741824

[[customizations.filesystem]]
mountpoint = '/var/log/audit'
size = 536870912

[[customizations.filesystem]]
mountpoint = '/var/tmp'
size = 536870912

# Compliance tooling for Security Content Automation Protocol (SCAP) remediation
[[packages]]
name = 'openscap-scanner'
version = '*'
[[packages]]
name = 'scap-security-guide'
version = '*'

# Identity Management (IdM) tooling
[[packages]]
name = 'ipa-client'
version = '*'
[[packages]]
name = 'oddjob'
version = '*'
[[packages]]
name = 'oddjob-mkhomedir'
version = '*'

# POSIX ACLs for fine-grained file permission control beyond standard ugo/rwx
[[packages]]
name = "acl"
version = "*"

# CCE-90843-4 Filesystem Integrity
[[packages]]
name = 'aide'
version = '*'

# CCE-84224-5 File Access Policy Daemon
[[packages]]
name = 'fapolicyd'
version = '*'

# CCE-87036-0 Mail server for sending email
[[packages]]
name = 'mailx'
version = '*'

# CCE-83595-9 Multifactor Authentication
[[packages]]
name = 'opensc'
version = '*'

# CCE-85984-3 Mail server for sending email
[[packages]]
name = 'postfix'
version = '*'

# CCE-82968-9 Hardware random number generator tools
[[packages]]
name = 'rng-tools'
version = '*'

# CCE-83987-8 rsyslog daemon TLS support
[[packages]]
name = 'rsyslog-gnutls'
version = '*'

# CCE-80644-8 Console screen lock support
[[packages]]
name = 'tmux'
version = '*'

# CCE-84203-9 Rogue USB device protection
[[packages]]
name = 'usbguard'
version = '*'

# CCE-88164-9 Host-based firewall
[[packages]]
name = 'firewalld'
version = '*'
